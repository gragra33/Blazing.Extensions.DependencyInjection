name: CI

on:
    push:
        branches:
            - develop
            - "feature/**"
            - "fix/**"
    pull_request:
        branches:
            - develop
            - main

jobs:
    validate-branch:
        name: Validate Branch Name
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - name: Check branch naming convention
              env:
                  BRANCH: ${{ github.head_ref }}
              run: |
                  if [[ ! "$BRANCH" =~ ^(feature|fix)/.+ ]]; then
                    echo "::error::Branch '$BRANCH' does not follow naming conventions."
                    echo "::error::PR source branches must be prefixed with 'feature/' or 'fix/'."
                    exit 1
                  fi
                  echo "Branch '$BRANCH' follows naming conventions."

    build-and-test:
        name: Build & Test (${{ matrix.framework }})
        needs: validate-branch
        if: always() && (needs.validate-branch.result == 'success' || needs.validate-branch.result == 'skipped')
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                framework: ["net8.0", "net9.0", "net10.0"]

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: |
                      8.0.x
                      9.0.x
                      10.0.x

            - name: Restore
              run: dotnet restore Blazing.Extensions.DependencyInjection.CI.slnx

            - name: Build
              run: dotnet build Blazing.Extensions.DependencyInjection.CI.slnx --no-restore --configuration Release -p:GeneratePackageOnBuild=false

            - name: Test (${{ matrix.framework }})
              run: |
                  dotnet test tests/Blazing.Extensions.DependencyInjection.Tests/Blazing.Extensions.DependencyInjection.Tests.csproj \
                    --no-build \
                    --configuration Release \
                    --framework ${{ matrix.framework }} \
                    --logger "trx;LogFileName=test-results-${{ matrix.framework }}.trx"

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              continue-on-error: true
              with:
                  name: test-results-${{ matrix.framework }}
                  path: "**/*.trx"
